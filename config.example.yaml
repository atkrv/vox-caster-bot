telegram_token: "YOUR_BOT_TOKEN"
channel_id: "@yourchannel"
poll_interval: "5m"
state_path: "state.json"
state_max_age: "720h"  # 30 days; items older than this are forgotten and may be re-sent
wiki_api: "https://wiki.example.com/api.php"
insecure_skip_verify: false
# proxy_url: "http://proxy.example.com:8080"    # optional; supports http://, https://, socks5://
                                                 # leave unset to use HTTP_PROXY/HTTPS_PROXY env vars

feeds:
  - url: "https://wiki.example.com/index.php?title=Special:NewPages&feed=rss"
    type: "new_page"
    template: |-
      ✨ My Wiki — new article

      {{if .PageURL}}<b><a href="{{.PageURL}}">{{html .Title}}</a></b>
      {{- else}}<b>{{html .Title}}</b>
      {{- end}}
      {{- if .Author}}
      👤 <i>{{html .Author}}</i>
      {{- end}}

      🏷 #wiki #new
  - url: "https://wiki.example.com/api.php?action=feedrecentchanges&feedformat=rss"
    type: "update"
    template: |-
      📝 My Wiki — updated

      {{if .PageURL}}<b><a href="{{.PageURL}}">{{html .Title}}</a></b>
      {{- else}}<b>{{html .Title}}</b>
      {{- end}}
      {{- if .Author}}
      👤 <i>{{html .Author}}</i>
      {{- end}}

      🏷 #wiki #update
